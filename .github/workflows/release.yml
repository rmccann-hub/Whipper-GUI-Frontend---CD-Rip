name: Release

# Push a version tag (e.g. `git tag v0.0.2 && git push origin v0.0.2`) and this
# builds the AppImage in a clean environment and attaches it to a GitHub
# Release automatically. No more hand-building or manual uploads — cutting a
# release is one `git tag`.
#
# The build itself reuses build/build_appimage.sh (the same script developers
# run locally), so there is exactly one build recipe to maintain.

on:
  push:
    tags:
      - "v*"
  # Manual trigger that CREATES the tag itself (via `gh release create
  # --target`). Exists because tag pushes aren't possible from every
  # environment (the cloud session's git proxy 403s tag refs) — this lets a
  # release be cut by dispatching the workflow on main with the tag name.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.2.4)"
        required: true

# Needed for the `gh release` calls to create/update the release, and for
# `gh workflow run` to dispatch the PyPI publish workflow.
permissions:
  contents: write # create the GitHub Release + upload assets
  actions: write # dispatch publish-pypi.yml (gh workflow run)

jobs:
  build-and-release:
    # Pin to 22.04 for a stable, older glibc — the AppImage bundles a
    # manylinux2014 CPython, so building on an older host keeps it broadly
    # compatible across the target distros (Bazzite, Fedora, Arch, Ubuntu).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build "python-appimage>=1.4,<2"
          # zsyncmake lets the build emit the .zsync delta-update file next
          # to the AppImage (KDD-17b self-update).
          sudo apt-get update -q && sudo apt-get install -y -q zsync

      - name: Build the AppImage
        env:
          # FUSE isn't available on GitHub runners; the build/appimagetool both
          # honour this and extract-and-run instead of mounting.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # Authenticated GitHub API access raises the rate limit for
          # python-appimage's CPython base-image download (anonymous requests
          # get 403'd under load).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash build/build_appimage.sh

      # Fail HERE, with a clear message, if the self-update artifacts are
      # missing — not later inside `gh release upload` (the v0.2.0 lesson:
      # a skipped embed surfaced only as a cryptic upload error, and the
      # release ended up with no assets at all).
      - name: Verify update artifacts
        run: |
          if [ ! -f whipper-gui-x86_64.AppImage.zsync ]; then
            echo "::error::.zsync missing — the update-information embed was skipped."
            echo "Check the build step's '[4/4] Embedding zsync update-information' output."
            exit 1
          fi

      - name: Generate checksum
        run: sha256sum whipper-gui-x86_64.AppImage > whipper-gui-x86_64.AppImage.sha256

      - name: Sanity-check the built AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          chmod +x whipper-gui-x86_64.AppImage
          ./whipper-gui-x86_64.AppImage --version

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tag-push runs use the pushed tag; dispatch runs carry it as input.
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # 0.x (and any tag with a pre-release suffix) ship as pre-releases.
          case "$TAG" in
            v0.*|*-*) PRERELEASE="--prerelease" ;;
            *)        PRERELEASE="" ;;
          esac
          # Create the release if it doesn't exist yet; otherwise just (re)upload
          # the assets. --generate-notes auto-summarises merged PRs since the
          # last tag; the canonical detailed notes live in CHANGELOG.md.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              whipper-gui-x86_64.AppImage whipper-gui-x86_64.AppImage.sha256 \
              whipper-gui-x86_64.AppImage.zsync \
              install.sh install-appimage.sh --clobber
          else
            gh release create "$TAG" \
              whipper-gui-x86_64.AppImage whipper-gui-x86_64.AppImage.sha256 \
              whipper-gui-x86_64.AppImage.zsync \
              install.sh install-appimage.sh \
              --title "Whipper GUI $TAG" \
              --target "$GITHUB_SHA" \
              --generate-notes \
              $PRERELEASE
          fi

      # Kick off the PyPI publish in its OWN run. We must DISPATCH it rather
      # than rely on a `release: published` trigger: the release above is
      # created with the default GITHUB_TOKEN, and GitHub suppresses the events
      # a GITHUB_TOKEN generates — so that trigger never fires (this is why
      # v0.2.4–v0.2.7 shipped with no PyPI publish). workflow_dispatch is the
      # documented EXCEPTION — it always creates a run, even via GITHUB_TOKEN —
      # so this is the reliable hand-off. Dispatched on the release TAG so the
      # publish builds the released commit. A separate run keeps the rule that a
      # PyPI problem can't block the AppImage release (already created above).
      - name: Trigger the PyPI publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: gh workflow run publish-pypi.yml --ref "$TAG"

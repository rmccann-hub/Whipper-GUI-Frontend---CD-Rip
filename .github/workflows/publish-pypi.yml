name: Publish to PyPI

# Builds the wheel + sdist and publishes them to PyPI.
#
# HOW IT'S TRIGGERED: release.yml dispatches this workflow (`gh workflow run`)
# right after it creates the GitHub Release, on the release TAG — so the
# checkout below builds the released commit. It is deliberately NOT triggered by
# a `release: published` event: release.yml creates the release with the default
# GITHUB_TOKEN, and GitHub suppresses the events a GITHUB_TOKEN generates, so
# that trigger never fired (this is why v0.2.4–v0.2.7 shipped with no PyPI
# publish). workflow_dispatch is the documented exception — it always creates a
# run, even when dispatched via GITHUB_TOKEN — so it's the reliable hand-off.
# You can also run it by hand to retry a publish.
#
# This stays the OIDC ENTRY workflow (the token's workflow_ref is
# publish-pypi.yml), so the trusted-publisher config below is exactly what PyPI
# must match — keep it as-is.
#
# Authentication uses PyPI **Trusted Publishing** (OIDC) — there is no API
# token or secret stored in this repo. ONE-TIME SETUP on PyPI before the first
# release that should publish (https://docs.pypi.org/trusted-publishers/):
#
#   PyPI → Publishing → "Add a pending publisher" (or, once the project
#   exists, the project's Publishing tab) with:
#     PyPI Project Name:  whipper-gui
#     Owner:              rmccann-hub
#     Repository name:    Whipper-GUI-Frontend---CD-Rip
#     Workflow name:      publish-pypi.yml
#     Environment name:   pypi
#
# Until that's configured the publish step fails LOUDLY (with `invalid-publisher`)
# — but in its OWN run, so a PyPI misconfiguration never blocks the AppImage
# release.

on:
  # Dispatched by release.yml after a release (see above); also runnable by hand
  # to retry a publish for an existing tag.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # The environment name must match the PyPI trusted-publisher config above.
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing — required.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build wheel + sdist and validate metadata
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          # Catch PyPI-invalid metadata before we try to upload.
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent re-runs: if this version is already on PyPI (e.g. a
          # release re-cut to re-upload AppImage assets), skip instead of
          # failing — PyPI versions are immutable.
          skip-existing: true

name: Publish to PyPI

# Publishes the wheel + sdist to PyPI when a GitHub Release is published.
# release.yml creates the release on a `v*` tag (which fires this), so a
# normal `git tag vX.Y.Z && git push --tags` ships both the AppImage AND the
# PyPI package with no extra step.
#
# Authentication uses PyPI **Trusted Publishing** (OIDC) — there is no API
# token or secret stored in this repo. ONE-TIME SETUP on PyPI before the first
# release that should publish (https://docs.pypi.org/trusted-publishers/):
#
#   PyPI → Publishing → "Add a pending publisher" (or, once the project
#   exists, the project's Publishing tab) with:
#     PyPI Project Name:  whipper-gui
#     Owner:              rmccann-hub
#     Repository name:    Whipper-GUI-Frontend---CD-Rip
#     Workflow name:      publish-pypi.yml
#     Environment name:   pypi
#
# Until that's configured the publish step fails LOUDLY — but this is a
# SEPARATE workflow from release.yml, so a PyPI misconfiguration never blocks
# the AppImage release.

on:
  release:
    types: [published]
  # Manual re-run for an existing tag if a publish needs retrying.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # The environment name must match the PyPI trusted-publisher config above.
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing — required.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build wheel + sdist and validate metadata
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          # Catch PyPI-invalid metadata before we try to upload.
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

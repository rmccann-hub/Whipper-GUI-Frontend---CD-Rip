name: CI

# Run the test suite on every push to main and every pull request, so
# regressions are caught before they land. This is the same `pytest` that
# passes locally — the suite needs no CD hardware (whipper/MusicBrainz/Qt are
# all faked or run headless).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # PySide6 imports a handful of system libraries even under the
      # "offscreen" Qt platform (no display needed). Install the minimal set;
      # without these the QApplication fixture in conftest.py fails to load.
      - name: Install headless Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libxkbcommon0 \
            libdbus-1-3 libfontconfig1 libfreetype6

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q
